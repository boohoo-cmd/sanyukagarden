<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — Sanyuka Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --maroon:       #7c2335;
      --maroon-light: #a33048;
      --maroon-dark:  #521626;
      --cream:        #fdf6ee;
      --gold:         #c9a84c;
      --text:         #2a1a1e;
      --text-muted:   #7a5a60;
      --white:        #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(253,246,238,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(124,35,53,0.12);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--maroon);
      text-decoration: none;
    }

    .nav-back {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--maroon); }

    /* ── HEADER ── */
    .menu-header {
      text-align: center;
      padding: 3.5rem 1.5rem 2rem;
      border-bottom: 1px solid rgba(124,35,53,0.1);
    }

    .menu-header .tag {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    .menu-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      color: var(--maroon-dark);
    }

    .menu-header p {
      margin-top: 0.6rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* ── CATEGORY TABS ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(124,35,53,0.1);
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 0.45rem 1.1rem;
      border-radius: 20px;
      border: 1.5px solid rgba(124,35,53,0.2);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn:hover { border-color: var(--maroon); color: var(--maroon); }

    .tab-btn.active {
      background: var(--maroon);
      border-color: var(--maroon);
      color: var(--white);
    }

    /* ── MENU CONTENT ── */
    .menu-body {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .category {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .category.visible { display: block; }

    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--maroon-dark);
      margin-bottom: 0.3rem;
    }

    .category-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    /* ── MENU ITEM ── */
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid rgba(124,35,53,0.07);
    }

    .menu-item:last-child { border-bottom: none; }

    .item-info { flex: 1; }

    .item-name {
      font-weight: 500;
      font-size: 0.97rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .item-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.5;
    }

    .item-price {
      font-family: 'Playfair Display', serif;
      font-size: 0.97rem;
      color: var(--maroon);
      white-space: nowrap;
      padding-top: 0.1rem;
    }

    /* ── FOOTER ── */
    .menu-footer {
      text-align: center;
      padding: 2.5rem 1.5rem 3rem;
      border-top: 1px solid rgba(124,35,53,0.1);
    }

    .menu-footer p {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 300;
      margin-bottom: 1.2rem;
    }

    .menu-footer a {
      color: var(--maroon);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid var(--maroon);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .menu-body { padding: 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Sanyuka</a>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </nav>

  <div class="menu-header">
    <p class="tag">Sanyuka Restaurant</p>
    <h1>Our Menu</h1>
    <p><!-- PLACEHOLDER: Add a short note e.g. "Prices in UGX · Subject to change" -->
      All prices in UGX · Ask your waiter about daily specials</p>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- MENU CONTENT -->
  <div class="menu-body" id="menuBody"></div>

  <div class="menu-footer">
    <p>Prices are subject to change. Ask your waiter for today's specials.</p>
    <a href="index.html">Visit our website</a>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════
    // MENU DATA — Edit this section when you get the real menu
    // Format: { name, desc, price } per item
    // ══════════════════════════════════════════════════════════
    const menuData = [
      {
        category: "Fish",
        icon: "🐟",
        note: "Freshly prepared", // PLACEHOLDER note
        items: [
          { name: "Tilapia (Whole)", desc: "Grilled or fried whole tilapia, served with chips or rice", price: "25,000" },
          { name: "Tilapia Fillet", desc: "Boneless tilapia fillet, your choice of sauce", price: "22,000" },
          { name: "Mukene (Omena)", desc: "Stewed silver fish with tomatoes and onions", price: "12,000" },
          // PLACEHOLDER — add more fish items here
        ]
      },
      {
        category: "Chicken",
        icon: "🍗",
        note: "Served with choice of side",
        items: [
          { name: "Grilled Chicken (Half)", desc: "Half chicken, marinated and grilled over charcoal", price: "28,000" },
          { name: "Chicken Stew", desc: "Slow-cooked chicken in rich tomato and herb sauce", price: "18,000" },
          { name: "Chicken Wings", desc: "Spiced and fried crispy wings, 6 pieces", price: "20,000" },
          // PLACEHOLDER — add more chicken items here
        ]
      },
      {
        category: "Goat",
        icon: "🥩",
        note: "Tender and well-seasoned",
        items: [
          { name: "Rolex Goat (Nyama Choma)", desc: "Roasted goat meat with ugali and kachumbari", price: "30,000" },
          { name: "Goat Stew", desc: "Slow-cooked goat in spiced sauce, served with rice or posho", price: "22,000" },
          { name: "Goat Ribs", desc: "Grilled goat ribs with a spicy marinade", price: "35,000" },
          // PLACEHOLDER — add more goat items here
        ]
      },
      {
        category: "Rice",
        icon: "🍚",
        note: "Served with sauce or alone",
        items: [
          { name: "Plain Rice", desc: "Steamed white rice", price: "5,000" },
          { name: "Pilau Rice", desc: "Spiced rice cooked with aromatic pilau masala", price: "10,000" },
          { name: "Fried Rice", desc: "Stir-fried rice with vegetables and egg", price: "12,000" },
          // PLACEHOLDER — add more rice dishes here
        ]
      },
      {
        category: "Soups",
        icon: "🍲",
        note: "Made fresh daily",
        items: [
          { name: "Beef Bone Soup", desc: "Rich broth with beef bones and vegetables", price: "12,000" },
          { name: "Chicken Soup", desc: "Light chicken broth with herbs and carrots", price: "10,000" },
          { name: "Groundnut Soup", desc: "Creamy peanut-based soup, a local favourite", price: "10,000" },
          // PLACEHOLDER — add more soups here
        ]
      },
      {
        category: "Beverages",
        icon: "🥤",
        note: "Soft drinks & juices",
        items: [
          { name: "Fresh Juice", desc: "Passion fruit, mango, or pineapple — ask for today's options", price: "5,000" },
          { name: "Soda (330ml)", desc: "Coca-Cola, Fanta, Sprite, Stoney", price: "3,000" },
          { name: "Water (500ml)", desc: "Still or sparkling", price: "2,000" },
          { name: "Tea / Coffee", desc: "Ugandan tea or instant coffee with milk", price: "4,000" },
          // PLACEHOLDER — add more beverages here
        ]
      },
      {
        category: "Alcohol",
        icon: "🍺",
        note: "Enjoy responsibly",
        items: [
          { name: "Nile Special (500ml)", desc: "Uganda's favourite lager, ice cold", price: "6,000" },
          { name: "Bell Lager (500ml)", desc: "Smooth Ugandan beer", price: "5,500" },
          { name: "Waragi (tot)", desc: "Uganda Waragi spirit, served straight or mixed", price: "4,000" },
          { name: "Tusker (500ml)", desc: "East African classic lager", price: "6,000" },
          // PLACEHOLDER — add more alcohol items here
        ]
      }
    ];
    // ══════════════════════════════════════════════════════════

    const tabsEl   = document.getElementById('tabs');
    const bodyEl   = document.getElementById('menuBody');

    // Build tabs + sections
    menuData.forEach((cat, i) => {
      // Tab button
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = `${cat.icon} ${cat.category}`;
      btn.dataset.index = i;
      btn.addEventListener('click', () => switchTab(i));
      tabsEl.appendChild(btn);

      // Category section
      const sec = document.createElement('div');
      sec.className = 'category' + (i === 0 ? ' visible' : '');
      sec.id = `cat-${i}`;

      const items = cat.items.map(item => `
        <div class="menu-item">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-desc">${item.desc}</div>
          </div>
          <div class="item-price">${item.price}<span style="font-family:'Jost',sans-serif;font-size:0.7rem;color:var(--text-muted);"> UGX</span></div>
        </div>
      `).join('');

      sec.innerHTML = `
        <h2 class="category-title">${cat.icon} ${cat.category}</h2>
        <p class="category-note">${cat.note}</p>
        ${items}
      `;
      bodyEl.appendChild(sec);
    });

    function switchTab(index) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.category').forEach((s, i) => {
        s.classList.toggle('visible', i === index);
      });
    }
  </script>

</body>
</html>
